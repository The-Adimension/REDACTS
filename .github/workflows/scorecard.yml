# ──────────────────────────────────────────────────────────────────────
# OpenSSF Scorecard — Supply-chain security health assessment
# Evaluates repository security posture across 18 heuristic checks
# (branch protection, dependency pinning, SAST, signed releases, etc.)
# Results upload to Security > Code scanning + OpenSSF dashboard.
# ──────────────────────────────────────────────────────────────────────

name: Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * 6"          # Saturday 04:00 UTC (weekly)

# Scorecard needs contents:read for repo analysis, security-events:write
# for SARIF upload, and id-token:write for publishing to the OpenSSF
# Scorecard API (enables the Scorecard badge).
permissions:
  contents: read
  security-events: write
  id-token: write

jobs:
  scorecard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@0864cf19026789058feabb7e87c5a8a0b0e3f8a5  # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98  # v4.32.6
        if: always()
        with:
          sarif_file: results.sarif
          category: scorecard
