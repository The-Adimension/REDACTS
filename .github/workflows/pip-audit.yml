# ──────────────────────────────────────────────────────────────────────
# Pip-Audit — Python dependency vulnerability scanner
# Scans requirements.txt against the OSV database for known CVEs.
# Uses PyPI Advisory Database + OSV.dev for comprehensive coverage.
# ──────────────────────────────────────────────────────────────────────

name: Pip-Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 6"          # Saturday 03:00 UTC (weekly)

permissions: {}                    # Reset all — least-privilege

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Run pip-audit
        uses: pypa/gh-action-pip-audit@c07f2f2573c830d6ae828ebcc08c01de20e4f4dd  # v1.1.0
        with:
          inputs: requirements.txt
